<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean English — Belajar Bahasa Inggris</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --deep: #020f1c;
  --navy: #041e36;
  --ocean: #0a3558;
  --mid: #0e5c8a;
  --wave: #1a8cbb;
  --foam: #4dc4e8;
  --sky: #a8e4f7;
  --white: #f0faff;
  --gold: #f0c84a;
  --coral: #ff6b6b;
  --green: #43d99e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--deep);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === OCEAN BACKGROUND === */
.ocean-bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #020d1a 0%, #041e36 40%, #0a3558 70%, #0e5c8a 100%);
  overflow: hidden;
}
.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(77,196,232,0.06);
  border: 1px solid rgba(77,196,232,0.12);
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0.5); opacity:0; }
  10% { opacity:1; }
  90% { opacity:0.6; }
  100% { transform: translateY(-20vh) scale(1.2); opacity:0; }
}
.wave-line {
  position: absolute;
  width: 200%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(77,196,232,0.3), transparent);
  animation: wave-move linear infinite;
}
@keyframes wave-move {
  0% { transform: translateX(-50%) scaleY(1); }
  50% { transform: translateX(0%) scaleY(2); }
  100% { transform: translateX(-50%) scaleY(1); }
}

/* === LAYOUT === */
.container {
  position: relative; z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* === HEADER === */
header {
  text-align: center;
  padding: 60px 0 40px;
}
.header-badge {
  display: inline-block;
  background: rgba(77,196,232,0.15);
  border: 1px solid rgba(77,196,232,0.4);
  border-radius: 30px;
  padding: 6px 18px;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--foam);
  margin-bottom: 20px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 6vw, 4rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--white) 0%, var(--foam) 50%, var(--sky) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  margin-bottom: 12px;
}
header p {
  color: rgba(168,228,247,0.7);
  font-size: 1rem;
  font-weight: 300;
  max-width: 500px;
  margin: 0 auto 30px;
}

/* === PROGRESS BAR === */
.progress-wrap {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(77,196,232,0.2);
  border-radius: 20px;
  padding: 16px 24px;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.progress-text { font-size: 13px; color: var(--foam); white-space: nowrap; }
.progress-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--wave), var(--foam));
  border-radius: 6px;
  transition: width 0.5s ease;
  width: 0%;
}
.score-badge {
  background: rgba(240,200,74,0.15);
  border: 1px solid rgba(240,200,74,0.4);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  white-space: nowrap;
}

/* === TOPIC TABS === */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 30px;
  justify-content: center;
}
.tab {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(77,196,232,0.2);
  border-radius: 20px;
  padding: 7px 16px;
  font-size: 12px;
  color: rgba(168,228,247,0.7);
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.tab:hover, .tab.active {
  background: rgba(77,196,232,0.2);
  border-color: var(--foam);
  color: var(--white);
}

/* === QUESTION CARD === */
.q-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(77,196,232,0.18);
  border-radius: 20px;
  padding: 30px;
  margin-bottom: 24px;
  transition: border-color 0.3s, transform 0.3s;
  animation: fadeIn 0.5s ease;
}
.q-card:hover { border-color: rgba(77,196,232,0.4); }
@keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.q-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.q-num {
  background: linear-gradient(135deg, var(--wave), var(--foam));
  color: var(--deep);
  font-weight: 700;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
}
.q-exam {
  background: rgba(240,200,74,0.15);
  border: 1px solid rgba(240,200,74,0.3);
  color: var(--gold);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.q-topic {
  background: rgba(67,217,158,0.1);
  border: 1px solid rgba(67,217,158,0.3);
  color: var(--green);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
}
.q-type {
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.3);
  color: var(--coral);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
}

.q-text {
  font-size: 1rem;
  font-weight: 500;
  line-height: 1.6;
  color: var(--white);
  margin-bottom: 20px;
}
.q-context {
  background: rgba(77,196,232,0.06);
  border-left: 3px solid var(--foam);
  border-radius: 0 10px 10px 0;
  padding: 12px 16px;
  margin-bottom: 16px;
  font-size: 0.9rem;
  color: var(--sky);
  font-style: italic;
  line-height: 1.6;
}

/* === OPTIONS === */
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
.opt {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(77,196,232,0.15);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 0.92rem;
  color: rgba(240,250,255,0.85);
  line-height: 1.5;
}
.opt:hover:not(.disabled) {
  background: rgba(77,196,232,0.12);
  border-color: var(--foam);
  color: var(--white);
  transform: translateX(4px);
}
.opt.selected { border-color: var(--wave); background: rgba(14,92,138,0.4); }
.opt.correct { border-color: var(--green); background: rgba(67,217,158,0.15); color: var(--white); }
.opt.wrong { border-color: var(--coral); background: rgba(255,107,107,0.12); }
.opt.disabled { cursor: default; }
.opt-letter {
  min-width: 26px; height: 26px;
  background: rgba(77,196,232,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  color: var(--foam);
  flex-shrink: 0;
}
.opt.correct .opt-letter { background: var(--green); color: var(--deep); }
.opt.wrong .opt-letter { background: var(--coral); color: white; }

/* === MULTI-SELECT === */
.multi-hint {
  font-size: 11px;
  color: rgba(168,228,247,0.6);
  margin-bottom: 10px;
  font-style: italic;
}
.multi-opt {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 16px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(77,196,232,0.15);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 0.92rem;
  color: rgba(240,250,255,0.85);
  margin-bottom: 8px;
}
.multi-opt:hover:not(.disabled) { background: rgba(77,196,232,0.12); border-color: var(--foam); }
.multi-opt.checked { border-color: var(--wave); background: rgba(14,92,138,0.4); }
.multi-opt.correct { border-color: var(--green); background: rgba(67,217,158,0.15); }
.multi-opt.wrong { border-color: var(--coral); background: rgba(255,107,107,0.1); }
.checkbox {
  min-width: 20px; height: 20px;
  border: 2px solid rgba(77,196,232,0.4);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.multi-opt.checked .checkbox { background: var(--wave); border-color: var(--wave); }
.multi-opt.correct .checkbox { background: var(--green); border-color: var(--green); }

/* === ESSAY === */
.essay-area {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(77,196,232,0.2);
  border-radius: 12px;
  padding: 14px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
  transition: border-color 0.3s;
}
.essay-area:focus { outline: none; border-color: var(--foam); }

/* === MATCHING === */
.match-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.match-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-items: center;
}
.match-left {
  background: rgba(77,196,232,0.08);
  border: 1px solid rgba(77,196,232,0.25);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.88rem;
  color: var(--sky);
}
.match-right select {
  width: 100%;
  background: rgba(4,30,54,0.8);
  border: 1.5px solid rgba(77,196,232,0.25);
  border-radius: 10px;
  padding: 10px 12px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.3s;
}
.match-right select:focus { outline: none; border-color: var(--foam); }
.match-right select.correct { border-color: var(--green); }
.match-right select.wrong { border-color: var(--coral); }

/* === BUTTONS === */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-check, .btn-show, .btn-reset {
  border: none;
  border-radius: 30px;
  padding: 10px 22px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.3s;
  letter-spacing: 0.5px;
}
.btn-check {
  background: linear-gradient(135deg, var(--wave), var(--foam));
  color: var(--deep);
}
.btn-check:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,140,187,0.4); }
.btn-show {
  background: transparent;
  border: 1.5px solid rgba(240,200,74,0.4);
  color: var(--gold);
}
.btn-show:hover { background: rgba(240,200,74,0.1); }
.btn-reset {
  background: transparent;
  border: 1.5px solid rgba(255,107,107,0.3);
  color: var(--coral);
}
.btn-reset:hover { background: rgba(255,107,107,0.1); }

/* === EXPLANATION BOX === */
.explanation {
  display: none;
  background: rgba(240,200,74,0.06);
  border: 1px solid rgba(240,200,74,0.25);
  border-radius: 14px;
  padding: 18px 20px;
  margin-top: 16px;
  font-size: 0.9rem;
  line-height: 1.7;
  color: rgba(240,250,255,0.9);
  animation: fadeIn 0.4s ease;
}
.explanation.show { display: block; }
.explanation strong { color: var(--gold); }
.explanation h4 {
  color: var(--gold);
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.explanation h4::before {
  content: '💡';
  font-size: 1rem;
}
.explanation .vocab {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(240,200,74,0.15);
}
.vocab-item {
  display: inline-block;
  background: rgba(77,196,232,0.1);
  border: 1px solid rgba(77,196,232,0.2);
  border-radius: 6px;
  padding: 3px 10px;
  margin: 3px;
  font-size: 0.82rem;
  color: var(--foam);
}

/* === FEEDBACK === */
.feedback {
  display: none;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  margin-top: 12px;
  text-align: center;
}
.feedback.correct { display: block; background: rgba(67,217,158,0.15); color: var(--green); border: 1px solid rgba(67,217,158,0.3); }
.feedback.wrong { display: block; background: rgba(255,107,107,0.12); color: var(--coral); border: 1px solid rgba(255,107,107,0.3); }

/* === SECTION HEADER === */
.section-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(77,196,232,0.15);
}
.section-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--wave), var(--foam));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.section-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  color: var(--foam);
}
.section-head span {
  font-size: 12px;
  color: rgba(168,228,247,0.5);
  margin-left: auto;
}

/* === SUMMARY === */
.summary-card {
  background: linear-gradient(135deg, rgba(14,92,138,0.4), rgba(10,53,88,0.6));
  border: 1px solid rgba(77,196,232,0.3);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  margin-top: 40px;
}
.summary-card h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--foam); margin-bottom: 10px; }
.summary-score { font-size: 3.5rem; font-weight: 900; color: var(--gold); font-family: 'Playfair Display', serif; }
.summary-label { color: rgba(168,228,247,0.6); font-size: 0.9rem; margin-bottom: 20px; }
.btn-restart {
  background: linear-gradient(135deg, var(--wave), var(--foam));
  color: var(--deep);
  border: none;
  border-radius: 30px;
  padding: 14px 36px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.3s;
}
.btn-restart:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(26,140,187,0.5); }

/* === FISH DECORATION === */
.fish {
  position: fixed;
  font-size: 24px;
  animation: swim linear infinite;
  z-index: 0;
  pointer-events: none;
}
@keyframes swim {
  0% { transform: translateX(-80px); }
  100% { transform: translateX(calc(100vw + 80px)); }
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--deep); }
::-webkit-scrollbar-thumb { background: var(--ocean); border-radius: 3px; }

/* === FILTER === */
.hidden { display: none; }
</style>
</head>
<body>

<!-- Ocean Background -->
<div class="ocean-bg" id="oceanBg"></div>

<div class="container">

  <header>
    <div class="header-badge">🌊 Ocean English Learning</div>
    <h1>Belajar Bahasa Inggris</h1>
    <p>Latihan soal interaktif sesuai kisi-kisi ujian. Kerjakan soal, lalu tampilkan penjelasan untuk belajar lebih dalam!</p>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <span class="progress-text">Progress: <span id="doneCount">0</span>/<span id="totalCount">0</span> soal</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="score-badge">⭐ Skor: <span id="scoreVal">0</span></div>
  </div>

  <!-- Topic Filter -->
  <div class="tabs">
    <button class="tab active" onclick="filterTopic('all')">Semua Topik</button>
    <button class="tab" onclick="filterTopic('intro')">Introducing</button>
    <button class="tab" onclick="filterTopic('greet')">Greetings</button>
    <button class="tab" onclick="filterTopic('procedure')">Procedure Text</button>
    <button class="tab" onclick="filterTopic('narrative')">Narrative Text</button>
    <button class="tab" onclick="filterTopic('hortatory')">Hortatory</button>
    <button class="tab" onclick="filterTopic('cv')">CV</button>
    <button class="tab" onclick="filterTopic('letter')">Job Application</button>
  </div>

  <!-- Questions will be injected here by JS -->
  <div id="questionsArea"></div>

  <!-- Summary -->
  <div class="summary-card" id="summaryCard" style="display:none">
    <h2>🏆 Selesai!</h2>
    <div class="summary-score" id="finalScore">0</div>
    <div class="summary-label">poin dari total jawaban benar</div>
    <p style="color:rgba(168,228,247,0.7); margin-bottom:20px; font-size:0.9rem" id="finalMsg"></p>
    <button class="btn-restart" onclick="restartAll()">🔄 Mulai Ulang</button>
  </div>

</div>

<script>
// ======================= DATA =======================
const questions = [

// ===== SECTION: INTRODUCING =====
{
  id: 1, topic: 'intro', type: 'PG',
  examNums: [1, 14],
  topicLabel: 'Introducing Oneself',
  question: 'Muzaki wants to introduce himself formally in front of the class at SMKS Insan Mandiri. Which expression is BEST for him to use?',
  options: [
    'Hey guys! I\'m Muzaki, nice to meet ya!',
    'Allow me to introduce myself. My name is Muzaki Setiawan, and I am a student of Teknik Jaringan Komputer dan Telekomunikasi.',
    'You can just call me Muzaki.',
    'Muzaki is my name, okay?'
  ],
  answer: 1,
  explanation: `<strong>Introducing Oneself (No. Soal Ujian: 1, 14)</strong><br><br>
Untuk memperkenalkan diri secara formal, gunakan struktur:<br>
• "Allow me to introduce myself. My name is ___."<br>
• "Good morning/afternoon, I'd like to introduce myself. I am ___."<br>
• "Let me introduce myself. My name is ___, and I study at ___."<br><br>
Ekspresi informal seperti "Hey guys! I'm Muzaki" hanya cocok untuk situasi santai.<br><br>
<strong>Contoh perkenalan formal lengkap Muzaki:</strong><br>
"Good morning. Allow me to introduce myself. My name is Muzaki Setiawan. I was born in Bandung on October 29, 2007. I live at Jl. Sariwangi. I am a student of SMKS Insan Mandiri, majoring in Teknik Jaringan Komputer dan Telekomunikasi."<br><br>
<div class="vocab">
<span class="vocab-item">Allow me to introduce</span>
<span class="vocab-item">Let me introduce myself</span>
<span class="vocab-item">My name is / I am</span>
<span class="vocab-item">I was born in Bandung</span>
<span class="vocab-item">I am a student of ___</span>
</div>`
},
{
  id: 2, topic: 'intro', type: 'PG',
  examNums: [1, 14],
  topicLabel: 'Introducing Oneself',
  question: 'Ayu says: "Hi everyone, I\'d like to tell you a little about myself. I was born in Bandung on May 20, 2007, and I currently study at SMKS Insan Mandiri." What is Ayu doing?',
  options: [
    'Giving a speech about Bandung',
    'Introducing herself',
    'Asking for information',
    'Saying goodbye'
  ],
  answer: 1,
  explanation: `<strong>Introducing Oneself — Konteks (No. Soal Ujian: 1, 14)</strong><br><br>
Ketika seseorang berkata "I'd like to tell you a little about myself" diikuti dengan informasi pribadi (tempat lahir, tanggal lahir, sekolah, dll), itu adalah teks <strong>perkenalan diri (self-introduction)</strong>.<br><br>
<strong>Biodata Ayu Wina Widiana:</strong><br>
• Nama: Ayu Wina Widiana<br>
• Lahir: Bandung, 20 Mei 2007<br>
• Sekolah: SMKS Insan Mandiri<br>
• Jurusan: Teknik Jaringan Komputer dan Telekomunikasi<br>
• Alamat: Jl. Ciwaruga<br><br>
<div class="vocab">
<span class="vocab-item">I'd like to tell you about myself</span>
<span class="vocab-item">I was born in Bandung on ___</span>
<span class="vocab-item">I currently study at ___</span>
<span class="vocab-item">I major in ___</span>
</div>`
},

{
  id: 3, topic: 'intro', type: 'PG',
  examNums: [2, 25],
  topicLabel: 'Introducing Others',
  question: 'Muzaki says to his teacher: "Sir, I\'d like you to meet my classmate, Ayu Wina Widiana. She also lives in Bandung and studies in the same major as me." What is Muzaki doing?',
  options: [
    'Introducing himself',
    'Greeting his teacher',
    'Introducing someone else',
    'Asking about Ayu'
  ],
  answer: 2,
  explanation: `<strong>Introducing Others (No. Soal Ujian: 2, 25)</strong><br><br>
Muzaki memperkenalkan orang lain (<em>introducing others</em>) — yaitu Ayu Wina Widiana — kepada gurunya.<br><br>
Frasa yang digunakan:<br>
• "I'd like you to meet ___." ← digunakan Muzaki<br>
• "This is my friend, ___."<br>

// ======================= STATE =======================
let answered = {};
let score = 0;
let currentFilter = 'all';

// ======================= RENDER =======================
function renderAll() {
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';

  const topics = {
    intro: { label: 'Introducing Oneself & Others', icon: '👋' },
    greet: { label: 'Greetings & Leave-Taking', icon: '🤝' },
    procedure: { label: 'Procedure Text', icon: '📋' },
    narrative: { label: 'Narrative Text', icon: '📖' },
    hortatory: { label: 'Hortatory Exposition', icon: '📢' },
    cv: { label: 'Curriculum Vitae (CV)', icon: '📄' },
    letter: { label: 'Job Application Letter', icon: '✉️' },
  };

  const topicsOrder = ['intro', 'greet', 'procedure', 'narrative', 'hortatory', 'cv', 'letter'];
  let totalVisible = 0;

  topicsOrder.forEach(topic => {
    const qs = questions.filter(q => q.topic === topic && (currentFilter === 'all' || currentFilter === topic));
    if (qs.length === 0) return;
    totalVisible += qs.length;

    const t = topics[topic];
    area.innerHTML += `
      <div class="section-head">
        <div class="section-icon">${t.icon}</div>
        <h2>${t.label}</h2>
        <span>${qs.length} soal</span>
      </div>
    `;

    qs.forEach(q => {
      area.innerHTML += buildCard(q);
    });
  });

  document.getElementById('totalCount').textContent = totalVisible;
  updateProgress();
}

function buildCard(q) {
  const examBadges = q.examNums.map(n => `<span class="q-exam">📝 No.${n}</span>`).join('');
  const state = answered[q.id] || {};

  let inputHTML = '';
  if (q.type === 'PG' || q.type === 'PG-Kompleks') {
    inputHTML = buildPGOptions(q, state);
  } else if (q.type === 'Menjodohkan') {
    inputHTML = buildMatching(q, state);
  } else if (q.type === 'Essay' || q.type === 'Uraian') {
    inputHTML = `<textarea class="essay-area" id="essay_${q.id}" placeholder="Tulis jawabanmu di sini...">${state.text || ''}</textarea>`;
  }

  const isPG = q.type === 'PG' || q.type === 'PG-Kompleks';
  // For PG: explanation auto-shows after answered. For others: toggle button remains.
  const autoShowExp = isPG && state.checked;
  const feedbackHTML = state.checked ? `<div class="feedback ${state.correct ? 'correct' : 'wrong'}">${state.correct ? '✅ Jawaban Benar! +1 poin' : '❌ Jawaban Kurang Tepat. Pelajari penjelasannya!'}</div>` : '';
  const explanationHTML = `<div class="explanation ${(autoShowExp || state.showExp) ? 'show' : ''}" id="exp_${q.id}">${q.explanation}</div>`;

  const btnCheck = `<button class="btn-check" onclick="checkAnswer(${q.id})">✓ Periksa Jawaban</button>`;
  const btnShow = `<button class="btn-show" onclick="toggleExp(${q.id})">💡 ${state.showExp ? 'Sembunyikan' : 'Tampilkan'} Penjelasan</button>`;
  const btnReset = `<button class="btn-reset" onclick="resetQ(${q.id})">↺ Reset</button>`;

  // PG: no check button (auto-checked on click), show reset only after answered
  // Matching: keep check button
  // Essay/Uraian: show toggle + reset
  let buttons = '';
  if (isPG) {
    buttons = state.checked ? `${btnReset}` : '';
  } else if (q.type === 'Menjodohkan') {
    buttons = !state.checked ? btnCheck : '';
    buttons += ` ${btnShow} ${btnReset}`;
  } else {
    buttons = `${btnShow} ${btnReset}`;
  }

  return `
    <div class="q-card" id="card_${q.id}">
      <div class="q-meta">
        <span class="q-num">Soal ${q.id}</span>
        ${examBadges}
        <span class="q-topic">${q.topicLabel}</span>
        <span class="q-type">${q.type}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${inputHTML}
      ${feedbackHTML}
      ${explanationHTML}
      ${buttons ? `<div class="btn-row" style="margin-top:12px">${buttons}</div>` : ''}
    </div>
  `;
}

function buildPGOptions(q, state) {
  return `<div class="options">
    ${q.options.map((opt, i) => {
      let cls = '';
      if (state.checked) {
        if (i === q.answer) cls = 'correct disabled';
        else if (i === state.selected) cls = 'wrong disabled';
        else cls = 'disabled';
      } else if (state.selected === i) cls = 'selected';
      const letter = String.fromCharCode(65 + i);
      return `<div class="opt ${cls}" onclick="selectOpt(${q.id}, ${i})">
        <div class="opt-letter">${letter}</div>
        <div>${opt}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildMatching(q, state) {
  const options = q.matchPairs.map(p => p.right);
  const shuffled = [...options].sort(() => Math.random() - 0.5);
  return `<div class="match-container">
    ${q.matchPairs.map((pair, i) => {
      const val = state.match ? state.match[i] : '';
      const cls = state.checked ? (val === pair.right ? 'correct' : 'wrong') : '';
      return `<div class="match-row">
        <div class="match-left">${pair.left}</div>
        <div class="match-right">
          <select id="match_${q.id}_${i}" class="${cls}" ${state.checked ? 'disabled' : ''}>
            <option value="">-- Pilih jawaban --</option>
            ${options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o.substring(0,50)}${o.length>50?'...':''}</option>`).join('')}
          </select>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ======================= INTERACTIONS =======================
function selectOpt(qid, idx) {
  const q = questions.find(q => q.id === qid);
  if (!answered[qid]) answered[qid] = {};
  if (answered[qid].checked) return;
  answered[qid].selected = idx;
  // Auto-check immediately
  answered[qid].checked = true;
  answered[qid].showExp = true;
  const correct = idx === q.answer;
  answered[qid].correct = correct;
  if (correct) score++;
  refreshCard(qid);
  updateProgress();
}

function checkAnswer(qid) {
  const q = questions.find(q => q.id === qid);
  if (!answered[qid]) answered[qid] = {};
  if (answered[qid].checked) return;

  if (q.type === 'PG' || q.type === 'PG-Kompleks') {
    if (answered[qid].selected === undefined) {
      alert('Pilih jawaban terlebih dahulu!'); return;
    }
    answered[qid].checked = true;
    const correct = answered[qid].selected === q.answer;
    answered[qid].correct = correct;
    if (correct) score++;
  } else if (q.type === 'Menjodohkan') {
    const matches = q.matchPairs.map((_, i) => {
      return document.getElementById(`match_${qid}_${i}`)?.value || '';
    });
    answered[qid].match = matches;
    answered[qid].checked = true;
    const correct = matches.every((m, i) => m === q.matchPairs[i].right);
    answered[qid].correct = correct;
    if (correct) score++;
  }

  refreshCard(qid);
  updateProgress();
}

function toggleExp(qid) {
  if (!answered[qid]) answered[qid] = {};
  answered[qid].showExp = !answered[qid].showExp;
  const el = document.getElementById(`exp_${qid}`);
  if (el) el.classList.toggle('show');
}

function resetQ(qid) {
  delete answered[qid];
  refreshCard(qid);
  updateProgress();
}

function refreshCard(qid) {
  const q = questions.find(q => q.id === qid);
  const card = document.getElementById(`card_${qid}`);
  if (!card) return;
  const newCard = document.createElement('div');
  newCard.innerHTML = buildCard(q);
  card.replaceWith(newCard.firstElementChild);
}

function updateProgress() {
  const total = questions.filter(q => currentFilter === 'all' || q.topic === currentFilter).length;
  const done = Object.keys(answered).filter(id => {
    const q = questions.find(q => q.id === parseInt(id));
    return q && answered[id].checked && (currentFilter === 'all' || q.topic === currentFilter);
  }).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressFill').style.width = total ? `${(done/total)*100}%` : '0%';
  document.getElementById('scoreVal').textContent = score;
  recalcScore();
}

function recalcScore() {
  score = Object.keys(answered).filter(id => answered[id].correct).length;
  document.getElementById('scoreVal').textContent = score;
}

function filterTopic(topic) {
  currentFilter = topic;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function restartAll() {
  answered = {};
  score = 0;
  document.getElementById('summaryCard').style.display = 'none';
  renderAll();
}

// ======================= OCEAN EFFECTS =======================
function createOceanFX() {
  const bg = document.getElementById('oceanBg');

  // Bubbles
  for (let i = 0; i < 25; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 40 + 10;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*15+8}s;
      animation-delay:${Math.random()*15}s;
    `;
    bg.appendChild(b);
  }

  // Wave lines
  for (let i = 0; i < 5; i++) {
    const w = document.createElement('div');
    w.className = 'wave-line';
    w.style.cssText = `
      top:${20+i*15}%;
      animation-duration:${8+i*3}s;
      animation-delay:${i*1.5}s;
      opacity:${0.3-i*0.04};
    `;
    bg.appendChild(w);
  }

  // Fish 🐠
  const fishEmojis = ['🐠','🐟','🐡','🦈','🐙'];
  fishEmojis.forEach((f, i) => {
    const fish = document.createElement('div');
    fish.className = 'fish';
    fish.textContent = f;
    fish.style.cssText = `
      top:${10+i*17}%;
      animation-duration:${20+i*8}s;
      animation-delay:${i*4}s;
      opacity:0.25;
    `;
    bg.appendChild(fish);
  });
}

// ======================= INIT =======================
createOceanFX();
renderAll();
</script>
